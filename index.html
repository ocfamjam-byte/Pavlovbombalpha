<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background-color: #1a1d1e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        .module { background-color: #a7acb2; border: 12px solid #2f3336; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .screen { background-color: #cbb965; border: 4px solid #1f2224; height: 100px; position: relative; padding: 10px; color: #222; font-weight: bold; }
        #timer { position: absolute; right: 10px; top: 30px; font-size: 50px; }
        #target-digit { position: absolute; top: 5px; left: 10px; font-size: 24px; }
        #typed-numbers { position: absolute; bottom: 5px; left: 10px; font-size: 24px; }

        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { font-size: 30px; background-color: #8c9096; border: none; border-radius: 8px; width: 80px; height: 60px; cursor: pointer; 
               box-shadow: 0 5px #555; transition: all 0.1s; }
        .btn:active { box-shadow: 0 2px #555; transform: translateY(3px); }
    </style>
</head>
<body>
    <div class="module">
        <div class="screen">
            <div id="target-digit">?</div>
            <div id="timer">01:00</div>
            <div id="typed-numbers"></div>
        </div>
        <div class="keypad" id="keypad"></div>
    </div>

    <script>
        // Change these 8 numbers to your preferred sequence
        const sequence = [1, 2, 3, 4, 5, 6, 7, 8]; 
        let currentStep = 0;
        let time = 60;
        let timerPaused = false;

        const targetDisplay = document.getElementById('target-digit');
        const typedDisplay = document.getElementById('typed-numbers');
        const timerDisplay = document.getElementById('timer');

        targetDisplay.innerText = sequence[currentStep];

        const keypad = document.getElementById('keypad');
        [1,2,3,4,5,6,7,8,9, null, 0, null].forEach(num => {
            if (num === null) { const spacer = document.createElement('div'); keypad.appendChild(spacer); }
            else {
                const btn = document.createElement('button');
                btn.className = 'btn'; btn.innerText = num;
                btn.onclick = () => press(num);
                keypad.appendChild(btn);
            }
        });

        function press(num) {
            if (timerPaused) return;
            if (num === sequence[currentStep]) {
                typedDisplay.innerText += num;
                currentStep++;
                if (currentStep < sequence.length) {
                    targetDisplay.innerText = sequence[currentStep];
                } else {
                    targetDisplay.innerText = "OK";
                    timerPaused = true;
                }
            } else {
                currentStep = 0;
                typedDisplay.innerText = "";
                targetDisplay.innerText = sequence[currentStep];
            }
        }

        setInterval(() => {
            if (!timerPaused && time > 0) {
                time--;
                timerDisplay.innerText = "00:" + (time < 10 ? "0" : "") + time;
            }
        }, 1000);
    </script>
</body>
</html>
